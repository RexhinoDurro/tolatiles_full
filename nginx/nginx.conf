limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# Docker's internal DNS — re-resolves service names every 30s so container
# IP changes after restarts never cause 502s.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    listen [::]:80;
    server_name tolatiles.com www.tolatiles.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tolatiles.com www.tolatiles.com;

    ssl_certificate /etc/letsencrypt/live/tolatiles.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tolatiles.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    client_max_body_size 20M;

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /ws/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /static/ {
        alias /static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /media/;
        expires 1y;
        add_header Cache-Control "public";
    }

    location /_next/static/ {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /_next/image {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        limit_req zone=general_limit burst=50 nodelay;
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name quote.tolatiles.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quote.tolatiles.com;

    ssl_certificate /etc/letsencrypt/live/tolatiles.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tolatiles.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location = / {
        return 301 https://$server_name/quotes-portal/quotes;
    }

    location /_next/static/ {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }

    location / {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Landing pages: any other subdomain, created ad hoc from /admin/landing-pages ────
# Requires a wildcard *.tolatiles.com DNS record and SSL cert — see DEPLOYMENT.md
# "Landing Pages on Wildcard Subdomains" for the one-time setup. nginx matches the most
# specific server_name first, so the quote.tolatiles.com block above still wins for that
# hostname even though it also matches this wildcard.
server {
    listen 80;
    listen [::]:80;
    server_name *.tolatiles.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.tolatiles.com;

    ssl_certificate /etc/letsencrypt/live/tolatiles.com/fullchain.pem;
